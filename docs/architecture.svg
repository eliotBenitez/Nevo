<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 630" width="100%" height="100%" style="background-color: #f8fafc;">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      
      .title { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; letter-spacing: -0.5px; }
      .subtitle { font-family: 'Inter', sans-serif; font-size: 11px; fill: #475569; }
      
      .node-text { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
      .node-subtext { font-family: 'Inter', sans-serif; font-size: 10px; fill: #475569; text-anchor: middle; }
      .arrow-label { font-family: 'Inter', sans-serif; font-size: 9px; fill: #475569; text-anchor: middle; }
      .badge-text { font-family: 'Inter', sans-serif; font-size: 8px; font-weight: 700; fill: #dc2626; text-anchor: middle; }
    </style>

    <!-- Markers for simple lines -->
    <marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 6 5 L 0 8 z" fill="#475569" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 6 5 L 0 8 z" fill="#a855f7" />
    </marker>
  </defs>

  <!-- BACKGROUND -->
  <rect width="800" height="630" fill="#f8fafc" />

  <!-- HEADER -->
  <g transform="translate(40, 45)">
    <text class="title">Схема архитектуры</text>
  </g>

  <!-- ==================== DIAGRAM NODES ==================== -->

  <!-- 1. Frontend UI -->
  <g transform="translate(120, 90)">
    <rect width="220" height="50" rx="4" fill="#ffffff" stroke="#10b981" stroke-width="1.5" />
    <text class="node-text" x="110" y="24">Интерфейс (Vue 3)</text>
    <text class="node-subtext" x="110" y="38">src/app/ , src/ui/</text>
  </g>

  <!-- 2. Pinia Stores -->
  <g transform="translate(460, 90)">
    <rect width="220" height="50" rx="4" fill="#ffffff" stroke="#10b981" stroke-width="1.5" />
    <text class="node-text" x="110" y="24">Хранилище (Pinia)</text>
    <text class="node-subtext" x="110" y="38">src/stores/</text>
  </g>

  <!-- 3. ProseMirror Editor (Isolated) -->
  <g transform="translate(120, 200)">
    <rect width="220" height="50" rx="4" fill="#ffffff" stroke="#a855f7" stroke-width="2" />
    <text class="node-text" x="110" y="24">Редактор ProseMirror</text>
    <text class="node-subtext" x="110" y="38">src/editor-core/</text>
  </g>

  <!-- 4. Tauri IPC Bridge -->
  <g transform="translate(120, 310)">
    <rect width="560" height="50" rx="4" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5" />
    <text class="node-text" x="280" y="24">Tauri IPC Bridge (Команды &amp; События)</text>
    <text class="node-subtext" x="280" y="38">src/tauri/ (TS)  ↔  src-tauri/src/lib.rs (Rust)</text>
  </g>

  <!-- 5. Rust Commands -->
  <g transform="translate(120, 420)">
    <rect width="230" height="50" rx="4" fill="#ffffff" stroke="#f97316" stroke-width="1.5" />
    <text class="node-text" x="115" y="24">Команды заметок &amp; диска</text>
    <text class="node-subtext" x="115" y="38">src-tauri/src/commands/</text>
  </g>

  <!-- 6. Local Servers -->
  <g transform="translate(450, 420)">
    <rect width="230" height="50" rx="4" fill="#ffffff" stroke="#f97316" stroke-width="1.5" />
    <text class="node-text" x="115" y="24">Серверы Collab &amp; Media</text>
    <text class="node-subtext" x="115" y="38">collab/ , media_server/</text>
  </g>

  <!-- 7. Local Storage -->
  <g transform="translate(285, 530)">
    <rect width="230" height="50" rx="4" fill="#ffffff" stroke="#64748b" stroke-width="1.5" />
    <text class="node-text" x="115" y="24">Локальное хранилище</text>
    <text class="node-subtext" x="115" y="38">Диск (.md) , Настройки (Secure Store)</text>
  </g>

  <!-- ==================== CONNECTOR LINES ==================== -->

  <!-- UI <-> Pinia (Bidirectional) -->
  <path d="M 345,115 L 455,115" stroke="#475569" stroke-width="1.2" fill="none" marker-end="url(#arrow)" />
  <path d="M 455,115 L 345,115" stroke="#475569" stroke-width="1.2" fill="none" marker-end="url(#arrow)" />

  <!-- UI -> Editor -->
  <path d="M 190,145 L 190,195" stroke="#475569" stroke-width="1.2" fill="none" marker-end="url(#arrow)" />
  <text class="arrow-label" x="160" y="174">Ввод / Опции</text>

  <!-- Editor -> UI (Event Bridge) -->
  <path d="M 270,195 L 270,145" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="3 3" fill="none" marker-end="url(#arrow-purple)" />
  <text class="arrow-label" x="315" y="174" fill="#a855f7">Event Bridge</text>

  <!-- Editor -> IPC Bridge -->
  <path d="M 230,255 L 230,305" stroke="#475569" stroke-width="1.2" fill="none" marker-end="url(#arrow)" />

  <!-- Pinia -> IPC Bridge -->
  <path d="M 570,145 L 570,305" stroke="#475569" stroke-width="1.2" fill="none" marker-end="url(#arrow)" />
  <text class="arrow-label" x="615" y="230">Вызовы API</text>

  <!-- IPC Bridge -> Rust Commands -->
  <path d="M 235,365 L 235,415" stroke="#475569" stroke-width="1.2" fill="none" marker-end="url(#arrow)" />

  <!-- IPC Bridge -> Local Servers -->
  <path d="M 565,365 L 565,415" stroke="#475569" stroke-width="1.2" fill="none" marker-end="url(#arrow)" />

  <!-- Rust Commands -> Storage -->
  <path d="M 235,475 L 235,500 Q 235,510 265,510 L 330,510 L 330,525" stroke="#475569" stroke-width="1.2" fill="none" marker-end="url(#arrow)" />

  <!-- Local Servers -> Storage -->
  <path d="M 565,475 L 565,500 Q 565,510 535,510 L 470,510 L 470,525" stroke="#475569" stroke-width="1.2" fill="none" marker-end="url(#arrow)" />
  <text class="arrow-label" x="400" y="500">Чтение / Запись</text>

</svg>
