name: Release

# Publishes signed installers and the updater manifest (latest.json) to a
# GitHub Release. Trigger by pushing a tag like `v0.1.2`, or run manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # Intel
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-pulseaudio \
            gstreamer1.0-tools \
            gstreamer1.0-x \
            gstreamer1.0-gl

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Tauri's `bundleMediaFramework` (via linuxdeploy-plugin-gstreamer) bundles a
      # fixed plugin list that omits `libgstlibav` (ffmpeg) and `h264parse`, so the
      # AppImage cannot decode MP4/H.264/AAC. Stage those plugins plus their full
      # ffmpeg dependency closure and inject them through `appimage.files`. Done in
      # CI only (paths/sonames are pinned to the ubuntu-22.04 runner) so it never
      # affects local builds.
      - name: Stage libav for the AppImage (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          set -euo pipefail
          GST_DIR="/usr/lib/x86_64-linux-gnu/gstreamer-1.0"
          PLUGINS="libgstlibav.so libgstvideoparsersbad.so"
          STAGE="$PWD/src-tauri/appimage-libs"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/usr/lib/gstreamer-1.0"

          # Libraries that must come from the host (graphics/system ABI).
          curl -fsSL https://raw.githubusercontent.com/AppImage/pkg2appimage/master/excludelist \
            | sed 's/#.*//' | tr -d '[:blank:]' | grep -v '^$' | sort -u > /tmp/excludelist
          is_excluded() { grep -qxF "$1" /tmp/excludelist; }

          : > /tmp/pairs
          # The GStreamer plugins, placed next to the already-bundled ones.
          for p in $PLUGINS; do
            [ -f "$GST_DIR/$p" ] || { echo "Missing plugin: $p"; exit 1; }
            cp -L "$GST_DIR/$p" "$STAGE/usr/lib/gstreamer-1.0/$p"
            patchelf --set-rpath '$ORIGIN/..' "$STAGE/usr/lib/gstreamer-1.0/$p"
            echo "usr/lib/gstreamer-1.0/$p|$STAGE/usr/lib/gstreamer-1.0/$p" >> /tmp/pairs
          done

          # Their transitive deps (ffmpeg + codec libs), minus host-provided ones
          # and the GStreamer core libs that the media framework already bundles.
          for p in $PLUGINS; do
            ldd "$GST_DIR/$p" | awk '/=> \// {print $3}'
          done | sort -u | while read -r path; do
            [ -f "$path" ] || continue
            base="$(basename "$path")"
            is_excluded "$base" && continue
            case "$base" in libgst*-1.0.so*) continue;; esac
            if [ ! -f "$STAGE/usr/lib/$base" ]; then
              cp -L "$path" "$STAGE/usr/lib/$base"
              patchelf --set-rpath '$ORIGIN' "$STAGE/usr/lib/$base" || true
            fi
            echo "usr/lib/$base|$STAGE/usr/lib/$base" >> /tmp/pairs
          done
          sort -u /tmp/pairs -o /tmp/pairs

          files_json=$(jq -Rn '[inputs | split("|") | {(.[0]): .[1]}] | add // {}' /tmp/pairs)
          jq --argjson f "$files_json" \
            '.bundle.linux.appimage.files = ((.bundle.linux.appimage.files // {}) + $f)' \
            src-tauri/tauri.conf.json > /tmp/conf.json
          mv /tmp/conf.json src-tauri/tauri.conf.json

          echo "Staged $(echo "$files_json" | jq 'length') files for the AppImage:"
          echo "$files_json" | jq -r 'keys[]'

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Nevo ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # Fail the build (the release stays a draft) if libav or any of its deps
      # did not make it into the AppImage, so we never publish a binary that
      # silently cannot play MP4/H.264.
      - name: Verify libav is bundled (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          set -euo pipefail
          app=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          echo "Inspecting: $app"
          "$app" --appimage-extract >/dev/null
          test -f squashfs-root/usr/lib/gstreamer-1.0/libgstlibav.so
          test -f squashfs-root/usr/lib/gstreamer-1.0/libgstvideoparsersbad.so
          missing=$(LD_LIBRARY_PATH="$PWD/squashfs-root/usr/lib" \
            ldd squashfs-root/usr/lib/gstreamer-1.0/libgstlibav.so 2>/dev/null \
            | awk '/not found/ {print $1}')
          if [ -n "$missing" ]; then
            echo "Unresolved libav dependencies inside the AppImage:"
            echo "$missing"
            exit 1
          fi
          echo "libgstlibav.so and its dependencies are present and resolvable."
