name: Release

# Publishes signed installers and the updater manifest (latest.json) to a
# GitHub Release. Trigger by pushing a tag like `v0.1.2`, or run manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # Intel
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-24.04'
            # AppImage отключён: на свежем WebKitGTK он не запускается, поэтому
            # собираем только .deb/.rpm (AppImage добавляется в Release вручную).
            args: '--bundles deb,rpm'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-pulseaudio \
            gstreamer1.0-tools \
            gstreamer1.0-x \
            gstreamer1.0-gl

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Nevo ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version. macOS: the app is ad-hoc signed (not notarized). After moving Nevo.app to /Applications, run "xattr -dr com.apple.quarantine /Applications/Nevo.app" once, or right-click the app and choose Open, to bypass Gatekeeper.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          retryAttempts: 2
          args: ${{ matrix.args }}

  # Builds a Flatpak bundle so Linux users get a fixed, recent WebKitGTK (from
  # the GNOME runtime) regardless of their distro. Runs after `release` so the
  # draft release already exists; it reuses the .deb that job published instead
  # of recompiling.
  flatpak:
    name: Flatpak (Linux)
    needs: release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Download the .deb from the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern '*_amd64.deb' \
            --dir . --clobber
          deb=$(ls *_amd64.deb | head -1)
          mv "$deb" flatpak-source.deb
          echo "Using $deb"

      - name: Build Flatpak bundle
        run: |
          set -euo pipefail
          flatpak-builder --user --install-deps-from=flathub --force-clean \
            --repo=flatpak-repo flatpak-build-dir com.eliotBenitezhvat.nevo.yml
          flatpak build-bundle flatpak-repo \
            "Nevo_${{ github.ref_name }}_amd64.flatpak" \
            com.eliotBenitezhvat.nevo \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload Flatpak to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: Nevo_${{ github.ref_name }}_amd64.flatpak
